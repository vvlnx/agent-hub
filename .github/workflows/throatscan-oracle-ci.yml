name: ThroatScan Oracle CI

on:
  push:
    paths:
      - "projects/throatscan-oracle/**"
      - ".github/workflows/throatscan-oracle-ci.yml"
  pull_request:
    paths:
      - "projects/throatscan-oracle/**"
      - ".github/workflows/throatscan-oracle-ci.yml"

defaults:
  run:
    working-directory: projects/throatscan-oracle

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: projects/throatscan-oracle/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Verify GICS coverage
        run: npm run verify:gics

      - name: Verify industry profiles
        run: npm run verify:industries
